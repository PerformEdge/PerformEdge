    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var theme = saved || "dark";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
